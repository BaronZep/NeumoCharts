<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neumo Charts</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="stylesheet" href="./css/tokens.css">
<link rel="stylesheet" href="./css/base.css">
<link rel="stylesheet" href="./css/neumo.css">
<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/controls.css">
<link rel="stylesheet" href="./css/preview.css">
<link rel="stylesheet" href="./css/chart.css">
</head>
<body>
<div class="app">

  <header class="app-header">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none" aria-label="Neumo Charts logo">
      <rect width="30" height="30" rx="9" fill="#9E68D2" opacity=".12"/>
      <rect x="5"  y="16" width="5" height="9"  rx="2.5" fill="#9E68D2"/>
      <rect x="13" y="9"  width="5" height="16" rx="2.5" fill="#D5B8EA"/>
      <rect x="21" y="13" width="5" height="12" rx="2.5" fill="#9E68D2"/>
    </svg>
    <h1>Neumo Charts</h1>
  </header>

  <div class="app-body">

    <aside class="panel raised" role="complementary" aria-label="Paramètres">

      <div>
        <div class="section-header">
          <p class="section-label" data-i18n="csv-label">Données CSV</p>
          <button class="import-btn raised-sm" id="importBtn"
            aria-label="Importer un fichier CSV"
            data-i18n="import-btn">Importer</button>
          <input type="file" id="fileInput" accept=".csv,.txt" style="display:none"
            aria-hidden="true">
        </div>
        <div class="csv-wrapper inset">
          <textarea class="csv-area" id="csvInput" spellcheck="false"
            aria-label="Contenu CSV"></textarea>
        </div>
      </div>

      <div>
        <p class="section-label" data-i18n="chart-type-label">Type de graphique</p>
        <div class="type-selector" role="radiogroup" aria-label="Type de graphique">
          <button class="type-btn raised-sm active" role="radio" aria-checked="true"
            data-type="barres">
            <span class="dot"></span><span data-i18n="type-barres">Barres</span>
          </button>
          <button class="type-btn raised-sm" role="radio" aria-checked="false"
            data-type="stacked">
            <span class="dot"></span><span data-i18n="type-stacked">Barres empilées</span>
          </button>
          <button class="type-btn raised-sm" role="radio" aria-checked="false"
            data-type="grouped">
            <span class="dot"></span><span data-i18n="type-grouped">Barres groupées</span>
          </button>
          <button class="type-btn raised-sm" role="radio" aria-checked="false"
            data-type="line">
            <span class="dot"></span><span data-i18n="type-line">Courbes</span>
          </button>
          <button class="type-btn raised-sm" role="radio" aria-checked="false"
            data-type="pie">
            <span class="dot"></span><span data-i18n="type-pie">Camembert</span>
          </button>
          <button class="type-btn raised-sm" role="radio" aria-checked="false"
            data-type="comparaison">
            <span class="dot"></span><span data-i18n="type-comparaison">Comparaison</span>
          </button>
        </div>

        <div id="pieOptions" style="display:none; margin-top:10px;">
          <p class="section-label" style="margin-bottom:6px;" data-i18n="pie-labels-label">Étiquettes</p>
          <div class="lang-slider inset" id="pieLabelsToggle"
            role="switch" aria-checked="true" tabindex="0"
            aria-label="Afficher les étiquettes">
            <span class="lang-thumb raised-sm"></span>
            <span class="lang-label lang-fr" data-i18n="toggle-off">Non</span>
            <span class="lang-label lang-en" data-i18n="toggle-on">Oui</span>
          </div>
        </div>
        <div id="compOptions" style="display:none; margin-top:10px;">
          <p class="section-label" style="margin-bottom:6px;" data-i18n="comp-max-label">Maximum</p>
          <input class="text-input inset" type="number" id="compMax"
            min="1" step="1" placeholder="auto"
            aria-label="Valeur maximale (100% de l'anneau)" />
        </div>
      </div>

      <div>
        <p class="section-label" data-i18n="colors-label">Couleurs</p>
        <div class="field">
          <div class="field-input inset select-wrap">
            <select id="cfgPalette" aria-label="Choix du nuancier">
              <option value="mercury" selected>Mercury</option>
              <option value="lavender">Lavender</option>
              <option value="ember">Ember</option>
              <option value="tide">Tide</option>
              <option value="moss">Moss</option>
              <option value="dusk">Dusk</option>
              <option value="rosewood">Rosewood</option>
            </select>
          </div>
        </div>
      </div>

      <div class="fields">
        <p class="section-label" data-i18n="config-label">Configuration</p>
        <div class="field">
          <label for="cfgTitle" data-i18n="title-label">Titre du graphique</label>
          <div class="field-input inset">
            <input type="text" id="cfgTitle"
              data-i18n-placeholder="title-placeholder"
              placeholder="Titre…">
          </div>
        </div>
        <div class="field">
          <label for="cfgXTitle" data-i18n="x-label">Titre axe X</label>
          <div class="field-input inset">
            <input type="text" id="cfgXTitle"
              data-i18n-placeholder="x-placeholder"
              placeholder="Axe X">
          </div>
        </div>
        <div class="field">
          <label for="cfgYTitle" data-i18n="y-label">Titre axe Y</label>
          <div class="field-input inset">
            <input type="text" id="cfgYTitle"
              data-i18n-placeholder="y-placeholder"
              placeholder="Axe Y">
          </div>
        </div>
      </div>

      <button class="gen-btn raised" id="generateBtn"
        data-i18n="generate-btn">Générer</button>
    </aside>

    <main class="preview raised" id="previewPanel" aria-label="Aperçu du graphique">
      <div class="preview-area" id="previewArea">
        <div class="empty-state" aria-hidden="true">
          <svg width="52" height="52" viewBox="0 0 52 52" fill="none"
            stroke="currentColor" stroke-width="1.8">
            <rect x="6"  y="30" width="10" height="16" rx="3"/>
            <rect x="21" y="18" width="10" height="28" rx="3"/>
            <rect x="36" y="23" width="10" height="23" rx="3"/>
          </svg>
          <p data-i18n="empty-state">Collez un CSV et cliquez sur Générer</p>
        </div>
      </div>
      <div class="preview-bar">
        <div class="slider-group">
          <div class="lang-slider inset" id="langToggle"
            role="switch" aria-checked="false" tabindex="0"
            aria-label="Langue / Language">
            <span class="lang-thumb raised-sm"></span>
            <span class="lang-label lang-fr">FR</span>
            <span class="lang-label lang-en">EN</span>
          </div>
          <div class="theme-slider inset" id="themeToggle"
            role="switch" aria-checked="false" tabindex="0"
            aria-label="Mode sombre / Dark mode">
            <span class="theme-thumb raised-sm"></span>
            <span class="theme-label theme-light" aria-hidden="true">
              <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
              </svg>
            </span>
            <span class="theme-label theme-dark" aria-hidden="true">
              <svg class="theme-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M21 12.79A9 9 0 1 1 11.21 3c0 .31.02.62.05.92A7 7 0 0 0 20.08 12c.3.03.61.05.92.05z"></path>
              </svg>
            </span>
          </div>
        </div>
        <button class="act-btn raised-sm" id="copyBtn" disabled
          aria-label="Copier le graphique dans le presse-papier">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg><span data-i18n="copy-btn">Copier</span>
        </button>
        <button class="act-btn raised-sm" id="dlBtn" disabled
          aria-label="Télécharger le graphique en PNG">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg><span data-i18n="dl-btn">Télécharger PNG</span>
        </button>
      </div>
    </main>
  </div>

  <footer class="app-version" aria-label="Version">
    <span>v1.5.0</span>
    <span class="privacy-badge" aria-label="Confidentialité">
      <span class="privacy-line">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span data-i18n="privacy-line1">Aucun serveur, aucun stockage.</span>
      </span>
      <span data-i18n="privacy-line2">Vos données ne quittent jamais votre appareil.</span>
    </span>
  </footer>
</div>

<div class="toast" id="toast" role="alert" aria-live="polite"></div>
<script type="module" src="./js/main.js"></script>
</body>
</html>
